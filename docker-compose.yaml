name: odc-server

x-odc-env: &odc-env
  ODC_DEFAULT_INDEX_DRIVER: postgis
  # Ghép chuỗi URL bằng các biến môi trường
  ODC_DEFAULT_DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
  ODC_POSTGIS_INDEX_DRIVER: postgis
  ODC_POSTGIS_DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
  EXPLORER_VERSION: 1.0.0

  DATACUBE_INDEX_DRIVER: postgis
  DATACUBE_DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
  
  DB_HOSTNAME: postgres
  DB_PORT: ${DB_PORT}
  DB_DATABASE: ${DB_NAME}
  DB_USERNAME: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}

x-explorer-build: &explorer-build
  context: ./datacube-explorer
  args:
    ENVIRONMENT: deployment
    EXPLORER_VERSION: 1.0.0

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: odc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          # Sửa lại câu lệnh test bằng biến
          "pg_isready -h localhost -p ${DB_PORT} -d ${DB_NAME} -U ${DB_USER}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - odc_net

  odc-init:
    build:
      context: .
      dockerfile: Dockerfile.odc
    # image: opendatacube/datacube-core:latest
    container_name: odc_init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *odc-env
    command: >
      bash -lc "
      datacube -v system init &&
      datacube system check
      "
    networks:
      - odc_net

  odc-server:
    # image: opendatacube/datacube-core:latest
    build:
      context: .
      dockerfile: Dockerfile.odc
    container_name: odc_server
    restart: unless-stopped
    depends_on:
      odc-init:
        condition: service_completed_successfully
    environment:
      <<: *odc-env
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./data:/data
    command: bash -lc "tail -f /dev/null"
    networks:
      - odc_net

  explorer:
    build: *explorer-build
    image: odc-explorer:local
    container_name: odc_explorer
    restart: unless-stopped
    depends_on:
      odc-init:
        condition: service_completed_successfully
    environment:
      <<: *odc-env
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
      POSTGRES_HOSTNAME: postgres
      PGPORT: "5432"
      POSTGRES_USER: opendatacube
      POSTGRES_PASSWORD: opendatacubepassword
      POSTGRES_DB: opendatacube
      CUBEDASH_DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
      CUBEDASH_INSTANCE_TITLE: Open Data Cube Explorer
    ports:
      - "8080:8080"
    networks:
      - odc_net

  explorer-init:
    build: *explorer-build
    image: odc-explorer:local
    container_name: odc_explorer_init
    restart: "no"
    profiles:
      - setup
    depends_on:
      odc-init:
        condition: service_completed_successfully
    environment:
      <<: *odc-env
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
    command: bash -lc "cubedash-gen -v --init"
    networks:
      - odc_net

  explorer-index:
    build: *explorer-build
    image: odc-explorer:local
    container_name: odc_explorer_index
    restart: "no"
    profiles:
      - tools
    depends_on:
      odc-init:
        condition: service_completed_successfully
    environment:
      <<: *odc-env
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
    command: bash -lc "cubedash-gen --all"
    networks:
      - odc_net

  jupyter:
    image: odc-jupyter:local
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    restart: unless-stopped
    depends_on:
      odc-init:
        condition: service_completed_successfully
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      ODC_DEFAULT_DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
      ODC_DEFAULT_INDEX_DRIVER: postgis
      DATACUBE_DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
      DATACUBE_INDEX_DRIVER: postgis
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=${JUPYTER_TOKEN}
    networks:
      - odc_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: odc_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - odc_net

networks:
  odc_net:
    name: odc_net

volumes:
  postgres_data:
  pgadmin_data:
